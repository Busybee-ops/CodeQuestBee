<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/global.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" data-url="/home" onclick="loadTab('/home', this)">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-url="/project1/" onclick="loadTab('/project1/', this)">Project 1</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-url="/project2/" onclick="loadTab('/project2/', this)">Project 2</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-url="/contact/" onclick="loadTab('/contact/', this)">Contact</a>
                    </li>
                </ul>
            </div> 
        </div>
    </nav>  
    <div id="main-content" class="container mt-4">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
